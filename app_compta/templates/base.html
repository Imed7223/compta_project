<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ComptaFlow{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap');
        body { font-family: 'Syne', sans-serif; background-color: #f0f2f8; }
        .nav-link-custom { transition: all 0.3s; border-radius: 8px; }
        .nav-link-custom:hover { background: rgba(78, 115, 223, 0.1); color: #4e73df !important; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex flex-wrap justify-between items-center">
            <a href="{% url 'dashboard' %}" class="text-xl md:text-2xl font-black text-indigo-600 tracking-tighter">
                COMPTA<span class="text-slate-800">FLOW</span>
            </a>
            
            <div class="flex items-center gap-2 md:gap-6 mt-2 md:mt-0 w-full md:w-auto justify-center md:justify-end">
                <a href="{% url 'dashboard' %}" class="nav-link-custom px-2 md:px-3 py-2 text-xs md:text-sm text-slate-600 font-semibold">Dashboard</a>
                <a href="{% url 'import_csv' %}" class="nav-link-custom px-2 md:px-3 py-2 text-xs md:text-sm text-slate-600 font-semibold">📁 Import</a>
                <div class="h-6 w-[1px] bg-slate-200 hidden md:block"></div>
                <span class="text-[10px] md:text-sm font-bold text-slate-400">ADMIN : {{ user.username }}</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="p-4 mb-4 rounded-xl text-sm {% if message.tags == 'success' %}bg-emerald-100 text-emerald-800 border border-emerald-200{% else %}bg-rose-100 text-rose-800 border border-rose-200{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-10 text-slate-400 text-[10px] md:text-xs">
        &copy; 2026 ComptaFlow - Intelligence Comptable Automatisée
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
